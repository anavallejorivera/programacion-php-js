<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2980b9" />
    </marker>
  </defs>

  <rect width="800" height="550" fill="#ffffff" />

  <rect x="50" y="100" width="180" height="320" rx="10" fill="#ffffff" stroke="#2c3e50" stroke-width="2" />
  <rect x="50" y="100" width="180" height="30" rx="10" fill="#2c3e50" />
  <text x="75" y="120" font-family="Arial" font-size="14" fill="#ffffff" font-weight="bold">Navegador Web</text>
  
  <text x="65" y="160" font-family="Arial" font-size="13" font-weight="bold">Interpreta:</text>
  <text x="65" y="185" font-family="Arial" font-size="12">HTML, CSS, JS</text>
  <text x="65" y="205" font-family="Arial" font-size="12">JSON, Imágenes</text>
  
  <line x1="60" y1="230" x2="220" y2="230" stroke="#ccc" />
  
  <text x="65" y="260" font-family="Arial" font-size="13" font-weight="bold">Si es desconocido:</text>
  <rect x="65" y="275" width="150" height="45" rx="5" fill="#fff3cd" stroke="#856404" />
  <text x="75" y="303" font-family="Arial" font-size="11" fill="#856404" font-weight="bold">DESCARGAR ARCHIVO</text>

  <rect x="450" y="50" width="320" height="450" rx="10" fill="#f8fbff" stroke="#2980b9" stroke-width="2" />
  <text x="520" y="40" font-family="Arial" font-size="16" font-weight="bold" fill="#2c3e50">Servidor (Apache / Nginx)</text>

  <rect x="480" y="80" width="260" height="100" rx="5" fill="#e1f5fe" stroke="#03a9f4" />
  <text x="495" y="105" font-family="Arial" font-size="13" font-weight="bold">Recursos Estáticos</text>
  <text x="495" y="130" font-family="Arial" font-size="12">Entrega directa:</text>
  <text x="495" y="155" font-family="Arial" font-size="11" fill="#01579b">.html, .css, .js, .png, .pdf...</text>

  <rect x="480" y="240" width="260" height="210" rx="5" fill="#fdfaff" stroke="#8e44ad" stroke-width="2" stroke-dasharray="4" />
  <text x="495" y="265" font-family="Arial" font-size="15" font-weight="bold" fill="#6c5ce7">Intérprete PHP</text>
  <text x="495" y="295" font-family="Arial" font-size="12">1. Ejecuta el script .php</text>
  <text x="495" y="315" font-family="Arial" font-size="12">2. Procesa la lógica</text>
  <text x="495" y="345" font-family="Arial" font-size="13" font-weight="bold">3. Genera y devuelve:</text>
  <text x="495" y="370" font-family="Arial" font-size="11" fill="#4b0082">HTML, JSON (API), XML,</text>
  <text x="495" y="390" font-family="Arial" font-size="11" fill="#4b0082">Imágenes dinámicas,</text>
  <text x="495" y="410" font-family="Arial" font-size="11" fill="#4b0082">Archivos binarios...</text>

  <circle r="7" fill="#3498db">
    <animate attributeName="cx" from="230" to="450" dur="3s" repeatCount="indefinite" />
    <animate attributeName="cy" from="200" to="200" dur="3s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="3s" repeatCount="indefinite" />
  </circle>
  <text x="270" y="190" font-family="Arial" font-size="11" fill="#2980b9">HTTP Request</text>

  <rect width="12" height="12" fill="#2ecc71">
    <animate attributeName="x" from="450" to="230" dur="3s" begin="1.5s" repeatCount="indefinite" />
    <animate attributeName="y" from="250" to="250" dur="3s" begin="1.5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="3s" begin="1.5s" repeatCount="indefinite" />
  </rect>
  <text x="270" y="280" font-family="Arial" font-size="11" fill="#27ae60">HTTP Response</text>

  <path d="M 610 185 L 610 230" stroke="#2980b9" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />
</svg>